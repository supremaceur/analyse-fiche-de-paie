<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>PaySlip Analyzer</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

    <meta name="theme-color" content="#6C63FF">
    <meta name="application-name" content="PaySlip Analyzer">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PaySlip Analyzer">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="Analysez et comprenez vos fiches de paie en toute simplicité.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(180deg, #0E1117 0%, #131620 50%, #0E1117 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #FAFAFA;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; padding: 2rem;
            text-align: center;
        }

        .logo {
            width: 140px; height: 140px; border-radius: 28px;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(108,99,255,0.3);
            animation: fadeIn 0.6s ease;
        }

        h1 {
            font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6C63FF, #4ECDC4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #9CA3AF; font-size: 0.95rem; margin-bottom: 2rem;
            max-width: 320px; line-height: 1.5;
        }

        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 1rem 2rem; border-radius: 12px; font-size: 1rem;
            font-weight: 600; text-decoration: none; cursor: pointer;
            border: none; transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6C63FF, #5A52E0);
            color: white; box-shadow: 0 4px 20px rgba(108,99,255,0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(108,99,255,0.5); }

        .btn-install {
            background: linear-gradient(135deg, #4ECDC4, #36B5AC);
            color: white; box-shadow: 0 4px 20px rgba(78,205,196,0.4);
            margin-bottom: 1rem; display: none;
        }
        .btn-install:hover { transform: translateY(-2px); }
        .btn-install.visible { display: inline-flex; }

        .loader {
            width: 32px; height: 32px; margin-top: 1.5rem;
            border: 3px solid rgba(108,99,255,0.2); border-top-color: #6C63FF;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        .auto-redirect {
            color: #6B7280; font-size: 0.8rem; margin-top: 1rem;
        }

        .footer {
            position: fixed; bottom: 1.5rem; left: 0; right: 0;
            text-align: center; color: #4B5563; font-size: 0.75rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .features {
            display: flex; gap: 1.5rem; margin: 1.5rem 0; flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            display: flex; align-items: center; gap: 0.4rem;
            color: #9CA3AF; font-size: 0.8rem;
        }
        .feature-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #4ECDC4; flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="icons/icon-192x192.png" alt="PaySlip Analyzer" class="logo">
        <h1>PaySlip Analyzer</h1>
        <p class="subtitle">Analysez et comprenez vos fiches de paie en toute simplicite</p>

        <div class="features">
            <div class="feature"><span class="feature-dot"></span> 53 lignes expliquees</div>
            <div class="feature"><span class="feature-dot"></span> Reglementation 2026</div>
            <div class="feature"><span class="feature-dot"></span> 100% confidentiel</div>
        </div>

        <!-- Bouton install PWA (apparait quand le prompt est disponible) -->
        <button id="installBtn" class="btn btn-install" onclick="installApp()">
            Installer l'application
        </button>

        <!-- Bouton principal -->
        <a id="openBtn" href="https://analyse-fiche-de-paie.streamlit.app" class="btn btn-primary">
            Ouvrir l'application
        </a>

        <div class="loader" id="loader"></div>
        <p class="auto-redirect" id="redirectMsg">Redirection automatique dans <span id="countdown">3</span>s...</p>

        <div class="footer">
            PaySlip Analyzer &mdash; Vos donnees restent privees et ne sont jamais stockees.
        </div>
    </div>

    <script>
        var STREAMLIT_URL = 'https://analyse-fiche-de-paie.streamlit.app';
        var deferredPrompt = null;

        // Enregistrer le service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function(reg) {
                console.log('SW registered:', reg.scope);
            });
        }

        // Capturer le prompt d'installation
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            // Afficher le bouton install
            document.getElementById('installBtn').classList.add('visible');
            // Stopper la redirection auto pour laisser le temps d'installer
            clearTimeout(redirectTimer);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('redirectMsg').textContent = '';
        });

        function installApp() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(result) {
                deferredPrompt = null;
                document.getElementById('installBtn').classList.remove('visible');
                if (result.outcome === 'accepted') {
                    // Rediriger apres installation
                    setTimeout(function() { window.location.href = STREAMLIT_URL; }, 1000);
                }
            });
        }

        // Detecter si on est en mode PWA installée
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                        || window.navigator.standalone === true;

        // Redirection automatique avec compte a rebours
        var count = isStandalone ? 1 : 3;
        var countdownEl = document.getElementById('countdown');

        if (isStandalone) {
            // Mode PWA : redirection rapide
            document.getElementById('loader').style.display = 'none';
            document.getElementById('redirectMsg').style.display = 'none';
            window.location.href = STREAMLIT_URL;
        } else {
            // Mode navigateur : laisser le temps de voir le prompt install
            countdownEl.textContent = count;
            var redirectTimer = setInterval(function() {
                count--;
                countdownEl.textContent = count;
                if (count <= 0) {
                    clearInterval(redirectTimer);
                    window.location.href = STREAMLIT_URL;
                }
            }, 1000);
        }

        // Detecter retour depuis l'installation
        window.addEventListener('appinstalled', function() {
            document.getElementById('installBtn').classList.remove('visible');
        });
    </script>
</body>
</html>
