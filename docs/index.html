<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>PaySlip Analyzer</title>

    <!-- PWA Manifest & Icons — contrôle total depuis GitHub Pages -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

    <!-- Meta PWA -->
    <meta name="theme-color" content="#6C63FF">
    <meta name="background-color" content="#0E1117">
    <meta name="application-name" content="PaySlip Analyzer">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PaySlip Analyzer">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#6C63FF">
    <meta name="msapplication-TileImage" content="icons/icon-144x144.png">
    <meta name="description" content="Analysez et comprenez vos fiches de paie en toute simplicité.">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0E1117; }
        iframe {
            width: 100%; height: 100%; border: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        }
        /* Splash screen pendant le chargement */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0E1117; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            transition: opacity 0.5s ease;
        }
        #splash.hidden { opacity: 0; pointer-events: none; }
        #splash img { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 24px; }
        #splash h1 {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #FAFAFA; font-size: 1.5rem; font-weight: 700;
        }
        #splash p {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #888; font-size: 0.9rem; margin-top: 8px;
        }
        .loader {
            margin-top: 32px; width: 40px; height: 40px;
            border: 3px solid rgba(108,99,255,0.2); border-top-color: #6C63FF;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Splash screen -->
    <div id="splash">
        <img src="icons/icon-192x192.png" alt="PaySlip Analyzer">
        <h1>PaySlip Analyzer</h1>
        <p>Chargement de l'application...</p>
        <div class="loader"></div>
    </div>

    <!-- App Streamlit en iframe plein écran -->
    <iframe id="app" src="" allow="clipboard-write; clipboard-read"></iframe>

    <script>
        // URL de l'app Streamlit Cloud — à personnaliser si besoin
        var STREAMLIT_URL = 'https://analyse-fiche-de-paie.streamlit.app';

        // Charger l'iframe
        var iframe = document.getElementById('app');
        var splash = document.getElementById('splash');
        iframe.src = STREAMLIT_URL;

        // Cacher le splash quand l'iframe est chargée
        iframe.addEventListener('load', function() {
            setTimeout(function() { splash.classList.add('hidden'); }, 500);
            setTimeout(function() { splash.style.display = 'none'; }, 1200);
        });

        // Fallback : cacher le splash après 8s max
        setTimeout(function() {
            splash.classList.add('hidden');
            setTimeout(function() { splash.style.display = 'none'; }, 600);
        }, 8000);

        // Enregistrer le service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function(reg) {
                console.log('PaySlip Analyzer SW registered', reg.scope);
            }).catch(function(err) {
                console.log('SW registration failed', err);
            });
        }
    </script>
</body>
</html>
